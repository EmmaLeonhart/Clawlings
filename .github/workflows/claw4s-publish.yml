name: "Claw4S: Generate PDF, Publish, and Fetch Review"

on:
  push:
    branches: [master]
    paths:
      - "claw4S/paper.md"
      - "claw4S/SKILL.md"
  workflow_dispatch:
    inputs:
      supersedes:
        description: "Post ID to supersede (leave empty for new submission)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    outputs:
      post_id: ${{ steps.submit.outputs.post_id }}
      paper_id: ${{ steps.submit.outputs.paper_id }}
      submitted: ${{ steps.submit.outputs.submitted }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install fpdf

      - name: Generate PDF
        run: python claw4S/generate_pdf.py

      - name: Check if PDF changed
        id: pdf_check
        run: |
          if git diff --quiet claw4S/paper.pdf 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit PDF if changed
        if: steps.pdf_check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add claw4S/paper.pdf
          git commit -m "Auto-generate paper.pdf from paper.md"
          git push

      - name: Compute content hash
        id: content_hash
        run: |
          HASH=$(cat claw4S/paper.md claw4S/SKILL.md | sha256sum | cut -d' ' -f1)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Check if submission needed
        id: submit_check
        run: |
          if [ -f claw4S/.last_submitted_hash ] && [ "$(cat claw4S/.last_submitted_hash)" = "${{ steps.content_hash.outputs.hash }}" ]; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Submit to clawRxiv
        id: submit
        if: steps.submit_check.outputs.needed == 'true'
        env:
          CLAWRXIV_API_KEY: ${{ secrets.CLAWRXIV_API_KEY }}
        run: |
          python - <<'PYEOF'
          import json, re, urllib.request, os, sys

          API_KEY = os.environ.get("CLAWRXIV_API_KEY", "")
          if not API_KEY:
              print("No CLAWRXIV_API_KEY set — skipping submission")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("submitted=false\n")
              sys.exit(0)

          supersedes = "${{ inputs.supersedes }}".strip()

          # Check for existing post ID to supersede automatically
          if not supersedes:
              try:
                  with open("claw4S/.post_id", "r") as f:
                      supersedes = f.read().strip()
                      print(f"Auto-superseding post {supersedes}")
              except FileNotFoundError:
                  pass

          with open("claw4S/paper.md", "r") as f:
              content = f.read()
          with open("claw4S/SKILL.md", "r") as f:
              skill = f.read()

          abstract_match = re.search(r'## Abstract\s*\n(.*?)(?=\n## [0-9])', content, re.DOTALL)
          abstract = abstract_match.group(1).strip() if abstract_match else content[:500]

          payload = {
              "title": "Clawling: Architecture and Early Population Dynamics of a Consent-Based Digital Organism",
              "abstract": abstract,
              "content": content,
              "skill_md": skill,
              "tags": ["digital-organisms", "artificial-life", "consent-mechanisms", "population-dynamics"],
              "human_names": ["Emma Leonhart"],
          }
          if supersedes:
              payload["supersedes"] = int(supersedes)

          data = json.dumps(payload, ensure_ascii=False).encode("utf-8")
          req = urllib.request.Request(
              "https://clawrxiv.io/api/posts",
              data=data,
              headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {API_KEY}",
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read())
                  print(f"Published: {json.dumps(result, indent=2)}")
                  post_id = str(result.get("id", ""))
                  paper_id = str(result.get("paper_id", ""))
                  with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                      f.write(f"post_id={post_id}\n")
                      f.write(f"paper_id={paper_id}\n")
                      f.write("submitted=true\n")
          except urllib.error.HTTPError as e:
              body = e.read().decode()
              print(f"Submission failed ({e.code}): {body}", file=sys.stderr)
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("submitted=false\n")
              sys.exit(1)
          PYEOF

      - name: Save post ID and submission hash
        if: steps.submit.outputs.submitted == 'true'
        run: |
          echo "${{ steps.submit.outputs.post_id }}" > claw4S/.post_id
          echo "${{ steps.submit.outputs.paper_id }}" > claw4S/.paper_id
          echo "${{ steps.content_hash.outputs.hash }}" > claw4S/.last_submitted_hash
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add claw4S/.post_id claw4S/.paper_id claw4S/.last_submitted_hash
          git commit -m "Record submission: post ${{ steps.submit.outputs.post_id }} (paper ${{ steps.submit.outputs.paper_id }})" || true
          git push || true

  fetch-review:
    needs: generate-and-publish
    if: needs.generate-and-publish.outputs.submitted == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: master

      - name: Pull latest (in case publish job pushed)
        run: git pull --rebase origin master || true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Wait for peer review and fetch
        env:
          POST_ID: ${{ needs.generate-and-publish.outputs.post_id }}
        run: |
          python - <<'PYEOF'
          import json, urllib.request, os, sys, time
          from datetime import datetime, timezone

          POST_ID = os.environ["POST_ID"]
          if not POST_ID:
              print("No post ID — cannot fetch review")
              sys.exit(1)

          os.makedirs("claw4S/reviews", exist_ok=True)

          # Retry schedule: first attempt at 30min, then every 15min, up to 2 hours total
          INITIAL_WAIT = 30 * 60    # 30 minutes
          RETRY_INTERVAL = 15 * 60  # 15 minutes
          MAX_WAIT = 2 * 60 * 60    # 2 hours total

          print(f"Waiting {INITIAL_WAIT // 60} minutes before first review fetch...")
          time.sleep(INITIAL_WAIT)

          elapsed = INITIAL_WAIT
          attempt = 1

          while elapsed <= MAX_WAIT:
              print(f"\nAttempt {attempt}: fetching comments for post {POST_ID}...")
              url = f"https://clawrxiv.io/api/posts/{POST_ID}/comments"
              try:
                  req = urllib.request.Request(url)
                  with urllib.request.urlopen(req) as resp:
                      data = json.loads(resp.read())
                      comments = data.get("comments", [])

                      if comments:
                          print(f"Found {len(comments)} comments!")
                          ts = datetime.now(timezone.utc).strftime("%Y%m%d_%H%M%S")

                          # Save raw JSON
                          review_file = f"claw4S/reviews/review_{ts}.json"
                          with open(review_file, "w") as f:
                              json.dump(data, f, indent=2)
                          print(f"Saved to {review_file}")

                          # Save human-readable markdown
                          md_file = f"claw4S/reviews/review_{ts}.md"
                          with open(md_file, "w") as f:
                              f.write(f"# Peer Review — Post {POST_ID}\n\n")
                              f.write(f"**Fetched:** {datetime.now(timezone.utc).isoformat()}\n\n")
                              for c in comments:
                                  author = c.get("clawName") or c.get("username") or "Anonymous"
                                  created = c.get("createdAt", "")
                                  content = c.get("content", "")
                                  f.write(f"## {author}\n")
                                  f.write(f"*{created}*\n\n")
                                  f.write(f"{content}\n\n")
                                  for reply in c.get("replies", []):
                                      r_author = reply.get("clawName") or reply.get("username") or "Anonymous"
                                      r_created = reply.get("createdAt", "")
                                      r_content = reply.get("content", "")
                                      f.write(f"### Reply — {r_author}\n")
                                      f.write(f"*{r_created}*\n\n")
                                      f.write(f"{r_content}\n\n")
                          print(f"Saved readable review to {md_file}")

                          # Also update the latest review pointer
                          with open("claw4S/reviews/LATEST.md", "w") as f:
                              with open(md_file) as src:
                                  f.write(src.read())

                          sys.exit(0)
                      else:
                          print("No comments yet.")

              except urllib.error.HTTPError as e:
                  print(f"HTTP error {e.code}: {e.read().decode()}")
              except Exception as e:
                  print(f"Error: {e}")

              if elapsed + RETRY_INTERVAL > MAX_WAIT:
                  break

              print(f"Waiting {RETRY_INTERVAL // 60} minutes before retry...")
              time.sleep(RETRY_INTERVAL)
              elapsed += RETRY_INTERVAL
              attempt += 1

          print(f"\nNo peer review received after {elapsed // 60} minutes. Giving up.")
          # Write a no-review marker so we know we tried
          with open("claw4S/reviews/no_review_yet.txt", "w") as f:
              f.write(f"No peer review received for post {POST_ID} after {attempt} attempts over {elapsed // 60} minutes.\n")
              f.write(f"Last check: {datetime.now(timezone.utc).isoformat()}\n")
          PYEOF

      - name: Commit review if found
        run: |
          if [ -d claw4S/reviews ] && [ "$(ls -A claw4S/reviews 2>/dev/null)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add claw4S/reviews/
            git commit -m "Fetch peer review for post ${{ needs.generate-and-publish.outputs.post_id }}" || true
            git push || true
          fi
